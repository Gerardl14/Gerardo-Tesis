name: Supabase Keep Alive

on:
  push:
    branches:
      - main
  schedule:
    # Se ejecuta TODOS LOS DÍAS a las 08:00 y 20:00 UTC para garantizar actividad constante
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch: # Permite disparar la acción manualmente desde la pestaña Actions en GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check Secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "::error::La variable de secreto SUPABASE_URL no está configurada en GitHub."
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "::error::La variable de secreto SUPABASE_ANON_KEY no está configurada en GitHub."
            exit 1
          fi

      - name: Ping Supabase REST API (Lectura)
        run: |
          curl --fail -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/forum_threads?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
