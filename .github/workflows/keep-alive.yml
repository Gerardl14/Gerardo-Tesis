name: Supabase Keep Alive

on:
  push:
    branches:
      - main
  schedule:
    # Se ejecuta TODOS LOS DÍAS a las 08:00 y 20:00 UTC para garantizar actividad constante
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch: # Permite disparar la acción manualmente desde la pestaña Actions en GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check Secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "::error::La variable de secreto SUPABASE_URL no está configurada en GitHub."
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "::error::La variable de secreto SUPABASE_ANON_KEY no está configurada en GitHub."
            exit 1
          fi
          echo "Secretos configurados correctamente"

      - name: Ping Supabase - Lectura
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "=== Realizando consulta de lectura ==="
          response=$(curl -s -w "\n%{http_code}" \
            "$SUPABASE_URL/rest/v1/keep_alive_log?select=id&limit=3" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Lectura fallo con codigo $http_code"
            exit 1
          fi
          echo "Lectura exitosa"

      - name: Ping Supabase - Escritura
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "=== Realizando operacion de escritura ==="
          response=$(curl -s -w "\n%{http_code}" \
            -X POST "$SUPABASE_URL/rest/v1/keep_alive_log" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "github-actions"}')
          http_code=$(echo "$response" | tail -n1)
          echo "HTTP Status: $http_code"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Escritura fallo con codigo $http_code"
            exit 1
          fi
          echo "Escritura exitosa"

      - name: Verificar tablas principales
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "=== Verificando actividad en multiples tablas ==="
          failed=0
          for table in profiles repositories grades forum_threads; do
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              "$SUPABASE_URL/rest/v1/$table?select=id&limit=1" \
              -H "apikey: $SUPABASE_ANON_KEY" \
              -H "Authorization: Bearer $SUPABASE_ANON_KEY")
            echo "  $table -> HTTP $http_code"
            if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
              echo "::warning::Tabla $table respondio con codigo $http_code"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "::warning::Algunas tablas no respondieron correctamente"
          fi
          echo "Verificacion de tablas completada"
