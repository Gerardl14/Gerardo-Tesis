name: Supabase Keep Alive

on:
  push:
    branches:
      - main
  schedule:
    # Se ejecuta TODOS LOS DÍAS a las 08:00 y 20:00 UTC para garantizar actividad constante
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch: # Permite disparar la acción manualmente desde la pestaña Actions en GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SB_URL: ${{ secrets.SUPABASE_URL }}
      SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Check Secrets
        run: |
          if [ -z "$SB_URL" ]; then
            echo "::error::La variable de secreto SUPABASE_URL no está configurada en GitHub."
            exit 1
          fi
          if [ -z "$SB_KEY" ]; then
            echo "::error::La variable de secreto SUPABASE_ANON_KEY no está configurada en GitHub."
            exit 1
          fi
          echo "✅ Secretos configurados correctamente"

      - name: Ping Supabase - Lectura
        run: |
          echo "=== Realizando consulta de lectura ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SB_URL}/rest/v1/keep_alive_log?select=id&limit=3" \
            -H "apikey: ${SB_KEY}" \
            -H "Authorization: Bearer ${SB_KEY}")
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Lectura falló con código $HTTP_CODE"
            exit 1
          fi
          echo "✅ Lectura exitosa"

      - name: Ping Supabase - Escritura
        run: |
          echo "=== Realizando operación de escritura ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${SB_URL}/rest/v1/keep_alive_log" \
            -H "apikey: ${SB_KEY}" \
            -H "Authorization: Bearer ${SB_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "github-actions"}')
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 201 ]; then
            echo "::error::Escritura falló con código $HTTP_CODE"
            exit 1
          fi
          echo "✅ Escritura exitosa"

      - name: Verificar tablas principales
        run: |
          echo "=== Verificando actividad en múltiples tablas ==="
          TABLES="profiles repositories grades forum_threads"
          for table in $TABLES; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "${SB_URL}/rest/v1/${table}?select=id&limit=1" \
              -H "apikey: ${SB_KEY}" \
              -H "Authorization: Bearer ${SB_KEY}")
            echo "  $table -> HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "::warning::Tabla $table respondió con código $HTTP_CODE"
            fi
          done
          echo "✅ Verificación de tablas completada"
